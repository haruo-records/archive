  <style>

    /* ─────────────────────────────
       PAGE HEADER
    ───────────────────────────── */
    .page-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .page-header__eyebrow {
      font-size: 0.6875rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 10px;
    }
    .page-header__title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .page-header__sub {
      font-size: 0.875rem;
      color: var(--faint);
      letter-spacing: 0.04em;
    }

    /* ─────────────────────────────
       CONTROLS
    ───────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 40px;
    }
    .year-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .year-filter__label {
      font-size: 0.6875rem;
      color: var(--faint);
      letter-spacing: 0.1em;
      margin-right: 4px;
    }
    .year-btn {
      display: inline-block;
      padding: 0.22em 0.75em;
      border: 1px solid var(--border-d);
      border-radius: 2px;
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      color: var(--sub);
      background: transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .year-btn:hover,
    .year-btn.active {
      background: var(--text);
      color: var(--white);
      border-color: var(--text);
    }
    .count-note {
      font-size: 0.6875rem;
      color: var(--faint);
      letter-spacing: 0.08em;
    }

    /* ─────────────────────────────
       ARCHIVE FEED
       作品ブロック一覧
    ───────────────────────────── */
    .archive-feed {
      /* 縦積みリスト */
    }

    /* 1作品 = 1ブロック */
    .work-block {
      margin-bottom: 64px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .work-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─────────────────────────────
       IMAGE ROW
       Phantom Graph: 複数画像を横並び
       同時視認 → 補完知覚
    ───────────────────────────── */
    .image-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    /* 単体 */
    .image-row--single .image-cell {
      max-width: 480px;
    }

    /* 2枚: 均等2分割 */
    .image-row--two .image-cell {
      flex: 1 1 0;
      min-width: 0;
    }

    /* 3枚: 均等3分割 */
    .image-row--three .image-cell {
      flex: 1 1 0;
      min-width: 0;
    }

    /* 4枚以上: 固定幅スクロール */
    .image-row--many {
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
    }
    .image-row--many .image-cell {
      flex: 0 0 auto;
      width: min(280px, 72vw);
      scroll-snap-align: start;
    }

    /* scrollbar */
    .image-row--many::-webkit-scrollbar { height: 2px; }
    .image-row--many::-webkit-scrollbar-track { background: var(--border); }
    .image-row--many::-webkit-scrollbar-thumb { background: var(--border-d); }

    /* 画像セル */
    .image-cell {
      background: var(--surface);
    }
    .image-cell img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }
    .image-cell img[data-gif="true"] {
      /* GIF: auto-play, そのまま */
    }

    /* ─────────────────────────────
       WORK META — 画像下
    ───────────────────────────── */
    .work-meta {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .work-meta__title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .work-meta__date {
      font-size: 0.75rem;
      color: var(--faint);
      letter-spacing: 0.08em;
    }
    .work-meta__count {
      font-size: 0.6875rem;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    /* ─────────────────────────────
       OBSERVATION NOTE
       複数画像の場合にのみ表示
    ───────────────────────────── */
    .obs-note {
      font-size: 0.625rem;
      color: var(--faint);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    /* ─────────────────────────────
       SECTION DIVIDER（年区切り）
    ───────────────────────────── */
    .year-divider {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--faint);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    /* ─────────────────────────────
       EMPTY / LOADING
    ───────────────────────────── */
    .state-msg {
      font-size: 0.875rem;
      color: var(--faint);
      letter-spacing: 0.06em;
      padding: 48px 0;
    }

    /* ─────────────────────────────
       RESPONSIVE
    ───────────────────────────── */
    @media (max-width: 600px) {
      .page-header { padding: 36px 0 24px; }
      .work-block  { margin-bottom: 48px; }

      /* 3枚以上はモバイルでスクロール */
      .image-row--three {
        overflow-x: auto;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 6px;
        flex-wrap: nowrap;
      }
      .image-row--three .image-cell {
        flex: 0 0 auto;
        width: 72vw;
        scroll-snap-align: start;
      }

      /* 2枚はそのまま横並び維持 */
      .image-row--two { gap: 6px; }
    }
  </style>

<body>

<div class="wrap">

    </div>

      <div class="year-filter" id="year-filter">
        <span class="year-filter__label">year —</span>

<script>
(async () => {

  const feed      = document.getElementById('archive-feed');
  const yearFilter = document.getElementById('year-filter');
  const countNote  = document.getElementById('count-note');

  /* ── URL param ── */
  function getParam(k) {
    return new URLSearchParams(location.search).get(k);
  }

  let allWorks = [];
  let activeYear = getParam('year') || 'all';

  /* ── fetch index.json (このファイルと同階層) ── */
  try {
    const res = await fetch('index.json');
    if (!res.ok) throw new Error('fetch failed');
    allWorks = await res.json();
  } catch(e) {
    feed.innerHTML = '<p class="state-msg">— data unavailable —</p>';
    return;
  }

  /* ── 年一覧を生成 ── */
  const years = ['all', ...new Set(allWorks.map(w => String(w.year)))]
    .sort((a, b) => a === 'all' ? -1 : Number(a) - Number(b));

  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (y === activeYear ? ' active' : '');
    btn.type = 'button';
    btn.textContent = y === 'all' ? 'all' : y;
    btn.addEventListener('click', () => {
      activeYear = y;
      history.replaceState(null, '',
        y === 'all' ? location.pathname : '?year=' + y);
      render();
      syncFilter();
    });
    yearFilter.appendChild(btn);
  });

  /* ── render ── */
  function render() {
    feed.innerHTML = '';

    const list = activeYear === 'all'
      ? allWorks
      : allWorks.filter(w => String(w.year) === activeYear);

    /* date昇順 */
    list.sort((a, b) =>
      a.year !== b.year ? a.year - b.year :
      a.month !== b.month ? a.month - b.month :
      a.slug.localeCompare(b.slug)
    );

    countNote.textContent = list.length + ' work' + (list.length !== 1 ? 's' : '');

    if (!list.length) {
      feed.innerHTML = '<p class="state-msg">— no records —</p>';
      return;
    }

    /* 年ごとにグループ化して区切りを挿入 */
    let currentYear = null;

    list.forEach((work, i) => {
      /* 年区切り */
      if (work.year !== currentYear) {
        currentYear = work.year;
        const div = document.createElement('p');
        div.className = 'year-divider';
        div.textContent = String(work.year);
        feed.appendChild(div);
      }

      /* 作品ブロック */
      const block = buildWorkBlock(work);
      block.style.transitionDelay = (i % 8 * 0.05) + 's';
      feed.appendChild(block);
    });

    /* Intersection Observer で fade-in */
    requestAnimationFrame(() => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            obs.unobserve(e.target);
          }
        });
      }, { threshold: 0.04 });
      feed.querySelectorAll('.work-block').forEach(el => obs.observe(el));
    });
  }

  /* ── 1作品ブロックを構築 ── */
  function buildWorkBlock(work) {
    const block = document.createElement('div');
    block.className = 'work-block';

    const files  = work.sourceFiles || [];
    const folder = work.folder || ('items/' + work.slug);
    const n      = files.length;

    /* 複数画像の場合のみ observation note */
    if (n > 1) {
      const note = document.createElement('p');
      note.className = 'obs-note';
      note.textContent = 'Observe the space between images.';
      block.appendChild(note);
    }

    /* image row */
    const row = document.createElement('div');
    let rowClass = 'image-row';
    if      (n === 1) rowClass += ' image-row--single';
    else if (n === 2) rowClass += ' image-row--two';
    else if (n === 3) rowClass += ' image-row--three';
    else              rowClass += ' image-row--many';
    row.className = rowClass;

    files.forEach(fname => {
      const cell = document.createElement('div');
      cell.className = 'image-cell';

      const img = document.createElement('img');
      img.alt     = work.slug;
      img.loading = 'lazy';
      /* GIF はデコードを eager に */
      const isGif = fname.toLowerCase().endsWith('.gif');
      if (isGif) {
        img.dataset.gif = 'true';
        img.decoding = 'auto';
      }
      /* パス: index.json の folder フィールドを使う */
      img.src = folder + '/' + fname;
      img.onerror = () => { cell.style.display = 'none'; };

      cell.appendChild(img);
      row.appendChild(cell);
    });

    block.appendChild(row);

    /* メタ情報 */
    const meta = document.createElement('div');
    meta.className = 'work-meta';

    const title = document.createElement('span');
    title.className = 'work-meta__title';
    title.textContent = work.title || work.slug;

    const date = document.createElement('span');
    date.className = 'work-meta__date';
    date.textContent = work.date || '';

    meta.appendChild(title);
    meta.appendChild(date);

    if (n > 1) {
      const cnt = document.createElement('span');
      cnt.className = 'work-meta__count';
      cnt.textContent = n + ' images';
      meta.appendChild(cnt);
    }

    block.appendChild(meta);
    return block;
  }

  /* ── フィルタ同期 ── */
  function syncFilter() {
    yearFilter.querySelectorAll('.year-btn').forEach(btn => {
      const y = btn.textContent;
      const on = y === activeYear || (y === 'all' && activeYear === 'all');
      btn.classList.toggle('active', on);
    });
  }

  render();

})();
</script>
