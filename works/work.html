<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>— Animals</title>
  <meta name="description" content="animals field notes">
  <link rel="canonical" href="https://haruo-records.github.io/archive/works/work.html">
  <!-- OGP -->
  <meta property="og:type"        content="article">
  <meta property="og:url"         content="https://haruo-records.github.io/archive/works/">
  <meta property="og:title"       content="Animals — Field Notes on Unknown Forms">
  <meta property="og:description" content="A speculative organism from the Animals archive.">
  <meta property="og:image"       content="https://haruo-records.github.io/archive/img/og-animals.png">
  <meta property="og:site_name"   content="Animals — haruo records">
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Animals — Field Notes on Unknown Forms">
  <meta name="twitter:description" content="A speculative organism from the Animals archive.">
  <meta name="twitter:image"       content="https://haruo-records.github.io/archive/img/og-animals.png">
  <link rel="stylesheet" href="../assets/style.css">
  <style>

    /* ─────────────────────────────
       WORK PAGE
    ───────────────────────────── */

    /* Back to Archive — top of page, clearly visible */
    .work-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--sub);
      letter-spacing: 0.04em;
      padding: 32px 0 28px;
      transition: color 0.18s;
    }
    .work-back:hover { color: var(--text); }

    /* ─────────────────────────────
       IMAGE FIELD
       All images shown simultaneously.
       No switching. No thumbnails.
    ───────────────────────────── */
    .image-field {
      margin-bottom: 40px;
    }

    /* observation note — quiet, minimal */
    .image-field__note {
      font-size: 0.6875rem;
      color: var(--faint);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    /* Single image */
    .image-field--single .image-row {
      display: block;
    }
    .image-field--single .image-row img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      background: var(--surface);
    }

    /* Two images: side by side, gap preserved intentionally */
    .image-field--two .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .image-field--two .image-row img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      background: var(--surface);
    }

    /* Three images: horizontal row */
    .image-field--three .image-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .image-field--three .image-row img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      background: var(--surface);
    }

    /* Four images: 2x2 grid */
    .image-field--four .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .image-field--four .image-row img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      background: var(--surface);
    }

    /* Five+ images: horizontal scroll strip */
    .image-field--many .image-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }
    .image-field--many .image-row img {
      flex-shrink: 0;
      height: 60vw;
      max-height: 480px;
      width: auto;
      object-fit: contain;
      scroll-snap-align: start;
      background: var(--surface);
    }

    /* Scrollbar — quiet */
    .image-field--many .image-row::-webkit-scrollbar {
      height: 2px;
    }
    .image-field--many .image-row::-webkit-scrollbar-track {
      background: var(--border);
    }
    .image-field--many .image-row::-webkit-scrollbar-thumb {
      background: var(--border-d);
    }

    /* ─────────────────────────────
       METADATA — below image field
    ───────────────────────────── */
    .work-meta-block {
      padding-top: 32px;
      border-top: 1px solid var(--border);
      max-width: 560px;
    }

    /* Title */
    .work-meta-block__title {
      font-size: clamp(1.25rem, 3vw, 1.625rem);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Date / category line */
    .work-meta-block__line {
      font-size: 0.75rem;
      color: var(--faint);
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* Archive note */
    .work-meta-block__note {
      font-size: 0.875rem;
      line-height: 1.85;
      color: var(--sub);
      margin-bottom: 20px;
      max-width: 48ch;
    }

    /* Tags */
    .work-meta-block__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 24px;
    }

    /* External links */
    .work-meta-block__links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .work-meta-block__link {
      font-size: 0.8125rem;
      color: var(--sub);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.18s;
    }
    .work-meta-block__link:hover { color: var(--text); }
    .work-meta-block__link::before { content: "\2197"; font-size: 0.65rem; }

    /* Archive context */
    .work-archive-context {
      margin-top: 24px;
      font-size: 0.6875rem;
      color: var(--faint);
      letter-spacing: 0.08em;
    }

    /* ─────────────────────────────
       NAVIGATION
    ───────────────────────────── */
    .work-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      gap: 8px;
    }
    .work-nav a {
      color: var(--sub);
      transition: color 0.18s;
    }
    .work-nav a:hover { color: var(--text); }
    .work-nav span { opacity: 0.3; }

    /* ─────────────────────────────
       MOBILE
    ───────────────────────────── */
    @media (max-width: 600px) {
      /* Two images: keep side by side, slightly tighter */
      .image-field--two .image-row {
        gap: 6px;
      }

      /* Three images: scroll on mobile */
      .image-field--three .image-row {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
        gap: 8px;
        padding-bottom: 8px;
      }
      .image-field--three .image-row img {
        flex-shrink: 0;
        height: 70vw;
        width: auto;
        scroll-snap-align: start;
      }

      .work-meta-block { max-width: 100%; }
      .work-back { padding: 24px 0 20px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <header class="site-header">
    <div class="site-header__bar">
      <p class="site-logo">
        <a href="../">haruo / records</a>
      </p>
      <nav class="site-nav">
        <a href="../works/" class="active">works</a>
      </nav>
    </div>
  </header>

  <main>
    <a class="work-back" href="index.html">&larr; Back to Archive</a>
    <div id="content">
      <p style="color:var(--faint);font-size:0.8125rem;padding:20px 0;">Loading&hellip;</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <div class="footer-group">
          <p class="footer-group__name">Animals</p>
          <ul>
            <li><a href="../works/">archive</a></li>
            <li><a href="../support/">support</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">HARMONEER</p>
          <ul>
            <li><a href="https://harmoneer.net/" target="_blank" rel="noopener">harmoneer.net</a></li>
            <li><a href="https://knowledge.harmoneer.net/" target="_blank" rel="noopener">knowledge</a></li>
            <li><a href="https://selfdesign.harmoneer.net/" target="_blank" rel="noopener">selfdesign</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">Rebooting Dad</p>
          <ul>
            <li><a href="https://www.instagram.com/haruo_harmoneer/" target="_blank" rel="noopener">instagram</a></li>
            <li><a href="https://x.com/haruo_harmoneer" target="_blank" rel="noopener">x.com</a></li>
          </ul>
        </div>
      </div>
      <p class="footer-copy">&copy; haruo records</p>
    </div>
  </footer>

</div><!-- /wrap -->

<script src="../assets/app.js"></script>
<script>
(async () => {
  const content = document.getElementById("content");
  const id      = getParam("id");

  if (!id) {
    content.innerHTML = "<p style=\"color:var(--faint);padding:40px 0;\">\u2014 id not specified \u2014</p>";
    return;
  }

  let works, work, idx;
  try {
    works = await fetchAllWorks();
    works.sort((a, b) =>
      (b.observed || b.date || "").localeCompare(a.observed || a.date || ""));
    idx  = works.findIndex(w => w.id === id);
    work = works[idx];
  } catch(e) {
    content.innerHTML = "<p style=\"color:var(--faint);padding:40px 0;\">\u2014 data unavailable \u2014</p>";
    return;
  }

  if (!work) {
    content.innerHTML = "<p style=\"color:var(--faint);padding:40px 0;\">\u2014 record not found \u2014</p>";
    return;
  }

  document.title = work.title + " \u2014 Animals";

  /* ── 全画像リストを確定する ──
   *
   * 優先順位:
   *   1. work.images が2件以上あればそのまま使う（fetchAllWorks 側で展開済みの場合）
   *   2. 1件以下の場合は meta.json を fetch して sourceFiles を取得する
   *      meta.json パス例: animals/test-tube/items/pianotrio/meta.json
   *   3. meta.json も取れなければ thumbnail 1枚にフォールバック
   *
   * 背景: animals/test-tube/index.json の旧版には sourceFiles がないため
   *       fetchAllWorks() が thumbnail 1枚しか images に入れられない問題がある。
   *       meta.json には必ず sourceFiles が含まれているのでそちらを正本とする。
   */
  let images = work.images && work.images.length >= 2
    ? work.images
    : null;

  // meta.json から sourceFiles を取得して images を上書き
  if (!images || images.length <= 1) {
    try {
      // work.series と work.id からパスを推定
      // 例: animals/test-tube/items/pianotrio/meta.json
      const series  = work.series || 'test-tube';
      const metaUrl = rootUp() + 'animals/' + series + '/items/' + work.id + '/meta.json';
      const mr = await fetch(metaUrl);
      if (mr.ok) {
        const meta = await mr.json();
        if (meta.sourceFiles && meta.sourceFiles.length) {
          // meta.json の sourceFiles はファイル名のみ → フルパスに変換
          const base = 'animals/' + series + '/items/' + work.id + '/';
          // ファイル名を自然順ソート（1,2,3...10,11 の順）
          const sorted = [...meta.sourceFiles].sort((a, b) =>
            a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
          );
          images = sorted.map(f => base + f);
          // thumbnail も更新
          if (!work.thumbnail && sorted.length) {
            work.thumbnail = base + sorted[0];
          }
        }
      }
    } catch(e) {
      // meta.json 取得失敗は無視してフォールバックへ
    }
  }

  // 最終フォールバック: thumbnail 1枚
  if (!images || !images.length) {
    images = work.thumbnail ? [work.thumbnail] : [];
  }

  const n = images.length;

  /* ── determine layout class ── */
  let fieldClass = "image-field--single";
  if      (n === 2) fieldClass = "image-field--two";
  else if (n === 3) fieldClass = "image-field--three";
  else if (n === 4) fieldClass = "image-field--four";
  else if (n >= 5)  fieldClass = "image-field--many";

  /* ── build image field ── */
  const imageField = document.createElement("div");
  imageField.className = "image-field " + fieldClass + " fade-in";

  /* quiet observation note for multi-image works */
  if (n > 1) {
    const note = document.createElement("p");
    note.className = "image-field__note";
    note.textContent = "Observe the space between images.";
    imageField.appendChild(note);
  }

  const row = document.createElement("div");
  row.className = "image-row";

  images.forEach((src, i) => {
    const img = document.createElement("img");
    img.alt = work.title + (n > 1 ? " " + (i + 1) : "");
    img.loading = i === 0 ? "eager" : "lazy";
    img.onerror = () => { img.style.display = "none"; };
    // リポジトリルート基準パスに rootUp() を付加
    img.src = (src && !src.startsWith('/') && !src.startsWith('http')) ? rootUp() + src : src;
    row.appendChild(img);
  });

  imageField.appendChild(row);

  /* ── metadata block ── */
  const metaBlock = document.createElement("div");
  metaBlock.className = "work-meta-block fade-in";
  metaBlock.style.transitionDelay = "0.08s";

  /* title */
  const titleEl = document.createElement("h1");
  titleEl.className = "work-meta-block__title";
  titleEl.textContent = work.title;
  metaBlock.appendChild(titleEl);

  /* date / category line */
  const lineParts = [work.series, work.observed || work.date].filter(Boolean);
  if (lineParts.length) {
    const line = document.createElement("p");
    line.className = "work-meta-block__line";
    line.textContent = lineParts.join(" \u00b7 ");
    metaBlock.appendChild(line);
  }

  /* archive note */
  if (work.description) {
    const note = document.createElement("p");
    note.className = "work-meta-block__note";
    note.textContent = work.description;
    metaBlock.appendChild(note);
  }

  /* tags */
  if ((work.tags || []).length) {
    const tagsDiv = document.createElement("div");
    tagsDiv.className = "work-meta-block__tags";
    (work.tags || []).forEach(t => {
      const a = document.createElement("a");
      a.className = "tag";
      a.textContent = t;
      // ../works/ に ?tag=xxx で遷移（一覧でその1タグが選択された状態）
      a.href = "../works/?tag=" + encodeURIComponent(t);
      tagsDiv.appendChild(a);
    });
    metaBlock.appendChild(tagsDiv);
  }

  /* external links */
  if (work.links && work.links.length) {
    const linksDiv = document.createElement("div");
    linksDiv.className = "work-meta-block__links";
    work.links.forEach(l => {
      const a = document.createElement("a");
      a.className = "work-meta-block__link";
      a.href = l.url;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = l.label;
      linksDiv.appendChild(a);
    });
    metaBlock.appendChild(linksDiv);
  }

  /* archive context */
  const ctx = document.createElement("p");
  ctx.className = "work-archive-context";
  ctx.textContent = "Part of the Animals archive.";
  metaBlock.appendChild(ctx);

  /* ── prev / next nav ── */
  const prev = idx > 0 ? works[idx - 1] : null;
  const next = idx < works.length - 1 ? works[idx + 1] : null;

  if (prev || next) {
    const navDiv = document.createElement("div");
    navDiv.className = "work-nav fade-in";
    navDiv.style.transitionDelay = "0.12s";

    if (prev) {
      const prevEl = document.createElement("a");
      prevEl.href = "work.html?id=" + encodeURIComponent(prev.id);
      prevEl.textContent = "\u2190 " + prev.title;
      navDiv.appendChild(prevEl);
    }

    if (next) {
      const nextEl = document.createElement("a");
      nextEl.href = "work.html?id=" + encodeURIComponent(next.id);
      nextEl.textContent = next.title + " \u2192";
      navDiv.appendChild(nextEl);
    }

    content.appendChild(navDiv);
  }

  /* ── assemble ── */
  content.innerHTML = "";
  content.appendChild(imageField);
  content.appendChild(metaBlock);

  /* fade-in trigger */
  requestAnimationFrame(() => {
    document.querySelectorAll(".fade-in").forEach(el => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }
        });
      }, { threshold: 0.03 });
      obs.observe(el);
    });
  });

})();
</script>
</body>
</html>
