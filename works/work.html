<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>— Animals</title>
  <meta name="description" content="animals field notes">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="wrap">

  <header class="site-header">
    <div class="site-header__bar">
      <p class="site-logo">
        <a href="/portal/">haruo / records</a>
      </p>
      <nav class="site-nav">
        <a href="/portal/works/" class="active">works</a>
        <a href="/portal/#elsewhere">links</a>
      </nav>
    </div>
  </header>

  <main>
    <div id="content">
      <p style="color:var(--faint);font-size:0.8125rem;padding:40px 0;">Loading…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <div class="footer-group">
          <p class="footer-group__name">Animals</p>
          <ul>
            <li><a href="/portal/works/">archive</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">HARMONEER</p>
          <ul>
            <li><a href="https://harmoneer.net/" target="_blank" rel="noopener">harmoneer.net</a></li>
            <li><a href="https://knowledge.harmoneer.net/" target="_blank" rel="noopener">knowledge</a></li>
            <li><a href="https://selfdesign.harmoneer.net/" target="_blank" rel="noopener">selfdesign</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">Rebooting Dad</p>
          <ul>
            <li><a href="https://www.instagram.com/haruo_harmoneer/" target="_blank" rel="noopener">instagram</a></li>
            <li><a href="https://x.com/haruo_harmoneer" target="_blank" rel="noopener">x.com</a></li>
          </ul>
        </div>
      </div>
      <p class="footer-copy">© haruo records</p>
    </div>
  </footer>

</div><!-- /wrap -->

<!-- Modal -->
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Image">
  <button class="modal__close" id="modal-close" type="button">close ✕</button>
  <img class="modal__img" id="modal-img" src="" alt="">
</div>

<script src="../assets/app.js"></script>
<script>
(async () => {
  const content   = document.getElementById('content');
  const modal     = document.getElementById('modal');
  const modalImg  = document.getElementById('modal-img');
  const modalClose = document.getElementById('modal-close');
  const id        = getParam('id');

  if (!id) {
    content.innerHTML = '<p style="color:var(--faint);padding:40px 0;">— id not specified —</p>';
    return;
  }

  let works, work, idx;
  try {
    works = await fetchWorks();
    works.sort((a, b) =>
      (b.observed || b.date || '').localeCompare(a.observed || a.date || ''));
    idx  = works.findIndex(w => w.id === id);
    work = works[idx];
  } catch(e) {
    content.innerHTML = '<p style="color:var(--faint);padding:40px 0;">— data unavailable —</p>';
    return;
  }

  if (!work) {
    content.innerHTML = '<p style="color:var(--faint);padding:40px 0;">— record not found —</p>';
    return;
  }

  document.title = work.title + ' — Animals';

  /* ── images ── */
  const images = work.images?.length ? work.images : (work.thumbnail ? [work.thumbnail] : []);
  let currentSrc = images[0] || '';

  /* ── gallery ── */
  const galleryDiv = document.createElement('div');
  galleryDiv.className = 'work-detail__gallery fade-in';

  const mainBox = document.createElement('div');
  mainBox.className = 'gallery__main';
  if (currentSrc) {
    mainBox.setAttribute('title', 'Click to enlarge');
    mainBox.addEventListener('click', () => openModal(mainImg.src));
  }

  const mainImg = document.createElement('img');
  mainImg.src = currentSrc;
  mainImg.alt = work.title;

  const hint = document.createElement('span');
  hint.className = 'gallery__hint';
  hint.textContent = 'click to enlarge';

  mainBox.appendChild(mainImg);
  if (currentSrc) mainBox.appendChild(hint);
  galleryDiv.appendChild(mainBox);

  /* thumbnails (if multiple) */
  if (images.length > 1) {
    const thumbsDiv = document.createElement('div');
    thumbsDiv.className = 'gallery__thumbs';
    images.forEach((src, i) => {
      const t = document.createElement('img');
      t.src = src;
      t.alt = work.title + ' ' + (i + 1);
      t.loading = 'lazy';
      if (i === 0) t.classList.add('active');
      t.addEventListener('click', () => {
        mainImg.src = src;
        thumbsDiv.querySelectorAll('img').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      });
      thumbsDiv.appendChild(t);
    });
    galleryDiv.appendChild(thumbsDiv);
  }

  /* ── info panel ── */
  const infoDiv = document.createElement('div');
  infoDiv.className = 'work-detail__info fade-in';
  infoDiv.style.transitionDelay = '0.08s';

  /* back button */
  const backBtn = document.createElement('a');
  backBtn.className = 'work-info__back';
  backBtn.href = 'index.html';
  backBtn.innerHTML = '← Animals';
  infoDiv.appendChild(backBtn);

  /* series */
  if (work.series) {
    const s = document.createElement('p');
    s.className = 'work-info__series';
    s.textContent = work.series;
    infoDiv.appendChild(s);
  }

  /* title */
  const titleEl = document.createElement('h1');
  titleEl.className = 'work-info__title';
  titleEl.textContent = work.title;
  infoDiv.appendChild(titleEl);

  /* meta table */
  const metaRows = [
    ['observed', work.observed || work.date],
    work.series && ['series', work.series],
  ].filter(Boolean).filter(([, v]) => v);

  if (metaRows.length) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'work-meta';
    metaRows.forEach(([k, v]) => {
      const row = document.createElement('div');
      row.className = 'work-meta__row';
      row.innerHTML = '<span class="work-meta__key">' + k + '</span><span class="work-meta__val">' + v + '</span>';
      metaDiv.appendChild(row);
    });
    infoDiv.appendChild(metaDiv);
  }

  /* description */
  if (work.description) {
    const desc = document.createElement('p');
    desc.className = 'work-info__desc';
    desc.textContent = work.description;
    infoDiv.appendChild(desc);
  }

  /* tags */
  if ((work.tags || []).length) {
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'work-info__tags';
    (work.tags || []).forEach(t => {
      tagsDiv.appendChild(makeTagLink(t, 'index.html?tag=' + encodeURIComponent(t)));
    });
    infoDiv.appendChild(tagsDiv);
  }

  /* external links */
  if (work.links && work.links.length) {
    const linksDiv = document.createElement('div');
    linksDiv.className = 'work-links';
    work.links.forEach(l => {
      const a = document.createElement('a');
      a.className = 'work-links__item';
      a.href = l.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = l.label;
      linksDiv.appendChild(a);
    });
    infoDiv.appendChild(linksDiv);
  }

  /* ── assemble detail ── */
  const detailDiv = document.createElement('div');
  detailDiv.className = 'work-detail';
  detailDiv.appendChild(galleryDiv);
  detailDiv.appendChild(infoDiv);

  /* ── prev / next nav ── */
  const prev = idx > 0 ? works[idx - 1] : null;
  const next = idx < works.length - 1 ? works[idx + 1] : null;
  const navDiv = document.createElement('div');
  navDiv.className = 'work-nav fade-in';
  navDiv.style.transitionDelay = '0.12s';
  navDiv.innerHTML =
    (prev ? '<a href="work.html?id=' + encodeURIComponent(prev.id) + '">← ' + prev.title + '</a>' : '<span>←</span>') +
    (next ? '<a href="work.html?id=' + encodeURIComponent(next.id) + '">' + next.title + ' →</a>' : '<span>→</span>');

  content.innerHTML = '';
  content.appendChild(detailDiv);
  content.appendChild(navDiv);

  /* trigger fade-in */
  requestAnimationFrame(() => {
    document.querySelectorAll('.fade-in').forEach(el => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.05 });
      obs.observe(el);
    });
  });

  /* ── modal ── */
  function openModal(src) {
    modalImg.src = src;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    modalImg.src = '';
  }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
})();
</script>
</body>
</html>
