<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animals — Archive</title>
  <meta name="description" content="A field notes archive of speculative organisms.">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* ── page header ── */
    .page-header {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .page-header__top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .page-title {
      font-size: clamp(1.75rem, 3.5vw, 2.125rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .page-sub {
      font-size: 0.875rem;
      color: var(--faint);
      letter-spacing: 0.04em;
      margin-top: 6px;
    }
    /* controls: filter + random */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="wrap">

  <header class="site-header">
    <div class="site-header__bar">
      <p class="site-logo">
        <a href="/animals/">haruo / records</a>
      </p>
      <nav class="site-nav">
        <a href="/animals/works/" class="active">works</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header fade-in">
      <div class="page-header__top">
        <h1 class="page-title">Animals</h1>
        <button class="btn-random" id="btn-random" type="button">
          ↻ &nbsp;Random
        </button>
      </div>
      <p class="page-sub">A field notes archive of speculative organisms.</p>
    </div>

    <div class="controls fade-in">
      <div class="filter-bar" id="filter-bar">
        <span class="filter-bar__label">filter —</span>
      </div>
      <p class="count-label" id="count-label"></p>
    </div>

    <div class="works-grid" id="works-grid" role="list"></div>

    <div style="margin-top:40px;">
      <a href="/animals/support/" style="font-size:0.8125rem;color:var(--sub);letter-spacing:0.04em;transition:color 0.18s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--sub)'">&rarr; Support animals</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <div class="footer-group">
          <p class="footer-group__name">Animals</p>
          <ul>
            <li><a href="/animals/works/">archive</a></li>
            <li><a href="/animals/support/">support</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">HARMONEER</p>
          <ul>
            <li><a href="https://harmoneer.net/" target="_blank" rel="noopener">harmoneer.net</a></li>
            <li><a href="https://knowledge.harmoneer.net/" target="_blank" rel="noopener">knowledge</a></li>
            <li><a href="https://selfdesign.harmoneer.net/" target="_blank" rel="noopener">selfdesign</a></li>
          </ul>
        </div>
        <div class="footer-group">
          <p class="footer-group__name">Rebooting Dad</p>
          <ul>
            <li><a href="https://www.instagram.com/haruo_harmoneer/" target="_blank" rel="noopener">instagram</a></li>
            <li><a href="https://x.com/haruo_harmoneer" target="_blank" rel="noopener">x.com</a></li>
          </ul>
        </div>
      </div>
      <p class="footer-copy">&copy; haruo records</p>
    </div>
  </footer>

</div><!-- /wrap -->

<script src="../assets/app.js"></script>
<script>
(async () => {
  const grid     = document.getElementById('works-grid');
  const filterBar = document.getElementById('filter-bar');
  const countEl  = document.getElementById('count-label');
  const btnRandom = document.getElementById('btn-random');

  let works = [];
  let activeTag = getParam('tag') || 'all';

  /* ── load data ── */
  try {
    works = await fetchWorks();
  } catch(e) {
    grid.innerHTML = '<p class="empty-state">— data unavailable —</p>';
    return;
  }

  /* ── build tag list ── */
  const allTags = ['all', ...new Set(works.flatMap(w => w.tags || []))]
    .sort((a, b) => a === 'all' ? -1 : b === 'all' ? 1 : a.localeCompare(b));

  allTags.forEach(tag => {
    const btn = makeTagButton(tag, () => {
      activeTag = tag;
      history.replaceState(null, '',
        tag === 'all' ? location.pathname : '?tag=' + encodeURIComponent(tag));
      renderGrid();
      syncFilter();
    });
    btn.setAttribute('aria-pressed', tag === activeTag ? 'true' : 'false');
    if (tag === activeTag) btn.classList.add('active');
    filterBar.appendChild(btn);
  });

  /* ── random button ── */
  btnRandom.addEventListener('click', () => {
    if (!works.length) return;
    const w = works[Math.floor(Math.random() * works.length)];
    location.href = 'work.html?id=' + encodeURIComponent(w.id);
  });

  /* ── render grid ── */
  function renderGrid() {
    grid.innerHTML = '';
    const list = activeTag === 'all'
      ? works
      : works.filter(w => (w.tags || []).includes(activeTag));

    list.sort((a, b) =>
      (b.observed || b.date || '').localeCompare(a.observed || a.date || ''));

    countEl.textContent = list.length + ' record' + (list.length !== 1 ? 's' : '');

    if (!list.length) {
      grid.innerHTML = '<p class="empty-state">— no records —</p>';
      return;
    }

    list.forEach((w, i) => {
      const card = document.createElement('a');
      card.className = 'work-card fade-in';
      card.href = 'work.html?id=' + encodeURIComponent(w.id);
      card.setAttribute('role', 'listitem');
      /* staggered fade */
      card.style.transitionDelay = (i * 0.04) + 's';

      /* thumbnail */
      const thumb = document.createElement('div');
      thumb.className = 'work-card__thumb';
      if (w.thumbnail) {
        thumb.appendChild(makeImg(w.thumbnail, w.title));
      } else {
        const ph = document.createElement('span');
        ph.className = 'work-card__no-img';
        ph.textContent = '—';
        thumb.appendChild(ph);
      }

      /* body */
      const tagPills = (w.tags || []).slice(0, 3)
        .map(t => '<span class="tag">' + t + '</span>').join('');

      const body = document.createElement('div');
      body.className = 'work-card__body';
      body.innerHTML =
        '<p class="work-card__title">' + w.title + '</p>' +
        '<p class="work-card__meta">' +
          [w.series, w.observed || w.date].filter(Boolean).join(' · ') +
        '</p>' +
        '<div class="work-card__tags">' + tagPills + '</div>';

      card.appendChild(thumb);
      card.appendChild(body);
      grid.appendChild(card);
    });

    /* trigger fade-in for newly added cards */
    requestAnimationFrame(() => {
      document.querySelectorAll('.work-card.fade-in').forEach(el => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.05 });
        obs.observe(el);
      });
    });
  }

  function syncFilter() {
    filterBar.querySelectorAll('.tag').forEach(btn => {
      const on = btn.textContent === activeTag;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  renderGrid();
})();
</script>
</body>
</html>
